<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google/inter-jetbrains-mono.css" rel="stylesheet"/>

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 === */
      --color-primary:              #3b82f6;
      --color-primary-container:    #2563eb;
      --color-on-primary:           #ffffff;
      /* === 背景 / 表面（深色 TradingView 风格 4 级深度） === */
      --color-background:                 #0a0a0f;
      --color-surface-container-lowest:   #0e0e16;
      --color-surface:                    #12121a;
      --color-surface-container:          #16162a;
      --color-surface-container-high:     #1a1a2e;
      --color-surface-container-highest:  #242438;
      /* === 文字 === */
      --color-on-surface:           #e5e7eb;
      --color-on-surface-variant:   #9ca3af;
      /* === 功能色（中国惯例：红涨绿跌） === */
      --color-success:  #22c55e;
      --color-error:    #ef4444;
      --color-warning:  #f59e0b;
      --color-up:       #ef4444;
      --color-down:     #22c55e;
      /* === 边框 === */
      --color-outline:          #2a2a3e;
      --color-outline-variant:  #1e1e30;
      /* === 圆角 === */
      --radius-sm:   0.25rem;
      --radius-md:   0.375rem;
      --radius-lg:   0.5rem;
      --radius-xl:   0.75rem;
      --radius-2xl:  1rem;
      --radius-full: 9999px;
      /* === 阴影（深色主题高 opacity） === */
      --shadow-card:   0 2px 8px rgba(0,0,0,0.4);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.5);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.6);
      /* === 字体 === */
      --font-sans: "Inter", "Noto Sans SC", system-ui, sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, monospace;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans">

  <!-- @nav:start 导航组件，不需要的页面则不要复制此段（从 @nav:start 到 @nav:end） -->
  <div class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-56 shrink-0 bg-background flex flex-col border-r border-outline-variant/20">
      <!-- Logo -->
      <div class="h-14 flex items-center gap-2.5 px-5 border-b border-outline-variant/20">
        <i data-lucide="candlestick-chart" class="w-5 h-5 text-primary"></i>
        <span class="font-bold text-sm tracking-wide">QuantFlow</span>
      </div>
      <!-- Nav -->
      <nav class="flex-1 py-3 px-3 space-y-0.5 overflow-y-auto">
        <a href="home.html" class="nav-item flex items-center gap-3 px-3 py-2 rounded-md text-on-surface-variant hover:bg-surface-container-high hover:text-on-surface text-sm font-medium transition-colors">
          <i data-lucide="layout-dashboard" class="w-4 h-4"></i>首页
        </a>
        <a href="api-data.html" class="nav-item flex items-center gap-3 px-3 py-2 rounded-md text-on-surface-variant hover:bg-surface-container-high hover:text-on-surface text-sm font-medium transition-colors">
          <i data-lucide="activity" class="w-4 h-4"></i>行情数据
        </a>
        <a href="account.html" class="nav-item flex items-center gap-3 px-3 py-2 rounded-md text-on-surface-variant hover:bg-surface-container-high hover:text-on-surface text-sm font-medium transition-colors">
          <i data-lucide="wallet" class="w-4 h-4"></i>账户交易
        </a>
        <a href="strategies.html" class="nav-item flex items-center gap-3 px-3 py-2 rounded-md text-on-surface-variant hover:bg-surface-container-high hover:text-on-surface text-sm font-medium transition-colors">
          <i data-lucide="brain" class="w-4 h-4"></i>策略管理
        </a>
        <a href="execution.html" class="nav-item flex items-center gap-3 px-3 py-2 rounded-md text-on-surface-variant hover:bg-surface-container-high hover:text-on-surface text-sm font-medium transition-colors">
          <i data-lucide="monitor-play" class="w-4 h-4"></i>执行监控
        </a>
        <a href="review.html" class="nav-item flex items-center gap-3 px-3 py-2 rounded-md text-on-surface-variant hover:bg-surface-container-high hover:text-on-surface text-sm font-medium transition-colors">
          <i data-lucide="chart-bar" class="w-4 h-4"></i>复盘分析
        </a>
        <a href="replay.html" class="nav-item flex items-center gap-3 px-3 py-2 rounded-md text-on-surface-variant hover:bg-surface-container-high hover:text-on-surface text-sm font-medium transition-colors">
          <i data-lucide="history" class="w-4 h-4"></i>历史回放
        </a>
      </nav>
      <!-- Bottom -->
      <div class="p-3 border-t border-outline-variant/20">
        <div class="flex items-center gap-2 px-2 py-1.5">
          <div class="w-7 h-7 rounded-full bg-primary/20 text-primary flex items-center justify-center text-xs font-bold">初</div>
          <span class="text-sm text-on-surface-variant">小初</span>
        </div>
      </div>
    </aside>

    <!-- Main Area -->
    <div class="flex-1 flex flex-col min-w-0">
      <!-- Top Header -->
      <header class="h-14 shrink-0 bg-surface flex items-center justify-between px-6 border-b border-outline-variant/20">
        <div class="flex items-center gap-3">
          <h1 class="text-sm font-semibold" id="page-title">首页</h1>
        </div>
        <div class="flex items-center gap-4">
          <!-- 搜索 -->
          <div class="flex items-center gap-2 bg-surface-container rounded-md px-3 py-1.5 text-sm text-on-surface-variant">
            <i data-lucide="search" class="w-3.5 h-3.5"></i>
            <span>搜索...</span>
          </div>
          <!-- 连接状态 -->
          <div class="flex items-center gap-1.5">
            <span class="w-2 h-2 rounded-full bg-success animate-pulse"></span>
            <span class="text-xs text-on-surface-variant">已连接</span>
          </div>
          <!-- 通知 -->
          <button class="relative p-1.5 rounded-md hover:bg-surface-container-high transition-colors">
            <i data-lucide="bell" class="w-4 h-4 text-on-surface-variant"></i>
            <span class="absolute -top-0.5 -right-0.5 w-3.5 h-3.5 bg-error text-white text-[10px] font-bold rounded-full flex items-center justify-center">3</span>
          </button>
        </div>
      </header>

      <!-- @nav:end 导航组件，不需要的页面则不要复制此段（从 @nav:start 到 @nav:end） -->

      <!-- @main-content:start -->
      <main class="flex-1 min-w-0 overflow-y-auto bg-background p-6">
        <!-- 页面内容由子 Agent 填充 -->
      </main>
      <!-- @main-content:end -->

    </div>
  </div>

  <script>lucide.createIcons();</script>
</body>

</html>
